name: Dependabot PR Handler

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  handle:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' || github.actor == 'snehalchavan11'
    permissions:
      pull-requests: write
      contents: read
      issues: write

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          alert-lookup: true
          github-token: ${{ secrets.PAT_TOKEN }}

      # 1. Assign your team as reviewer
      - name: Assign reviewer group
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers: ['snehalchavan11']
            })

      # 2. Add severity label
      - name: Add severity label
        uses: actions/github-script@v7
        env:
          CVSS: ${{ steps.metadata.outputs.cvss }}
        with:
          script: |
            const cvss = parseFloat(process.env.CVSS) || 0;
            let label;
            if (cvss >= 9.0)      label = 'security: critical';
            else if (cvss >= 7.0) label = 'security: high';
            else if (cvss >= 4.0) label = 'security: medium';
            else                  label = 'security: low';

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [label]
            })
